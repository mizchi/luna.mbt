name: browser

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  # Vitest browser tests
  vitest-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Build MoonBit
        run: |
          # Core libraries
          moon build --target js --release luna/src
          moon build --target js --release luna/src/js/api
          moon build --target js --release luna/src/js/api_signals
          moon build --target js --release luna/src/js/stream_renderer
          moon build --target js --release luna/src/x/stella
          # Test packages for browser tests
          moon build --target js --release luna/src/tests/counter_component
          moon build --target js --release luna/src/tests/counter_client
          moon build --target js --release luna/src/tests/browser_components
          moon build --target js --release luna/src/tests/router_csr
          # Examples for browser tests
          moon build --target js --release luna/src/examples/spa
          moon build --target js --release luna/src/examples/todomvc
          moon build --target js --release luna/src/examples/browser_router
          moon build --target js --release luna/src/examples/wc
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Vitest browser tests
        run: pnpm test:browser

  # E2E tests with Playwright
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Build MoonBit
        run: |
          # Core libraries
          moon build --target js --release luna/src
          moon build --target js --release luna/src/js/api
          moon build --target js --release luna/src/js/api_signals
          moon build --target js --release luna/src/js/stream_renderer
          moon build --target js --release luna/src/x/stella
          # Test packages for e2e tests
          moon build --target js --release luna/src/tests/counter_component
          moon build --target js --release luna/src/tests/counter_client
          moon build --target js --release luna/src/tests/browser_components
          moon build --target js --release luna/src/tests/router_csr
          # Examples for e2e tests
          moon build --target js --release luna/src/examples/spa
          moon build --target js --release luna/src/examples/todomvc
          moon build --target js --release luna/src/examples/browser_router
          moon build --target js --release luna/src/examples/wc
          moon build --target js --release luna/src/examples/apg-playground
      - name: Build Loader
        run: pnpm --filter @luna_ui/luna-loader build
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: E2E tests
        run: pnpm playwright test --config luna/e2e/playwright.config.mts

  # astra middleware Playwright + node:test build_dev_parity smoke
  astra-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Build astra CLI bundle
        run: moon build --target js --release
      - name: Install Playwright Chromium
        # Install via astra's own pnpm context so the headless-shell
        # cache path matches astra's @playwright/test version.
        run: cd astra && pnpm exec playwright install chromium --with-deps
      - name: astra Playwright (dev_smoke)
        run: cd astra && pnpm test:e2e

  # sol Playwright (loader, hydration, async-streaming, etc.)
  sol-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Build workspace
        run: moon build --target js --release
      - name: Install Playwright Chromium
        # Install via sol's own pnpm context so the headless-shell
        # cache path matches sol's @playwright/test version.
        run: cd sol && pnpm exec playwright install chromium --with-deps
      - name: sol Playwright
        run: cd sol && pnpm test:e2e

  # Cross-package node:test smokes (build/dev parity + examples matrix
  # + sol cli node:tests). Faster than the Playwright runs above.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Build workspace
        run: moon build --target js --release
      - name: Build debug for sol generate flow (sol_app/auth/todo)
        run: moon build --target js
      - name: Run integration smokes
        run: pnpm test:integration
      - name: sol cli node:tests
        run: |
          cd sol
          node --test e2e/cli-golden-path.test.js
          node --test e2e/template-check.test.js
          node --test e2e/generate-codegen.test.js
