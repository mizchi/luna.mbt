name: monorepo

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # Workspace-wide moon check + moon test (covers luna + sol + astra).
  # Cheap and worth always running so cross-package breakage is caught early.
  workspace-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Setup CJS test environment
        run: |
          mkdir -p _build/js/debug/test
          echo '{"type": "commonjs"}' > _build/js/debug/test/package.json
      - name: moon check (workspace — luna + sol + astra)
        run: moon check --target js
      - name: Build workspace packages
        run: |
          cd js/wcr && pnpm build
          cd ../stella && pnpm build
      - name: TypeScript check
        run: pnpm tsc -b
      - name: moon test (workspace — luna + sol + astra)
        # moon.work members [".", "./sol", "./astra"]; this runs every
        # test across the three packages in one pass.
        run: moon test --target js

  # Cross-package node:test smokes (build/dev parity + examples matrix
  # + sol cli node:tests). Faster than the Playwright runs in per-package
  # workflows, so kept in the always-run monorepo workflow.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Build workspace
        run: moon build --target js --release
      - name: Build debug for sol generate flow (sol_app/auth/todo)
        run: moon build --target js
      - name: Run integration smokes
        run: pnpm test:integration
      - name: sol cli node:tests
        run: |
          cd sol
          node --test e2e/moon-install.test.js
          node --test e2e/cli-golden-path.test.js
          node --test e2e/template-check.test.js
          node --test e2e/cloudflare-starter.test.js
          node --test e2e/generate-codegen.test.js
