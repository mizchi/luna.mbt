name: docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'src/ssg/**'
      - '.github/workflows/docs.yaml'
  pull_request:
    paths:
      - 'website/**'
      - 'src/ssg/**'
      - '.github/workflows/docs.yaml'

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Clone markdown.mbt
        run: git clone --depth 1 https://github.com/mizchi/markdown.mbt ../markdown.mbt
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: extractions/setup-just@v3
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
          moon install
      - name: Sync markdown.mbt sources
        run: |
          cp ../markdown.mbt/moon.mod.json .mooncakes/mizchi/markdown/
          cp -r ../markdown.mbt/src/* .mooncakes/mizchi/markdown/src/
      - name: Build MoonBit
        run: moon build --target js --release src/cli
      - name: Build docs with Sol SSG
        run: node _build/js/release/build/cli/cli.js build
      - name: Smoke test built docs
        run: just smoke-docs
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: website/dist-docs

  deploy-cloudflare:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: website/dist-docs
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping deploy — Cloudflare secrets not configured."
          else
            pnpm dlx wrangler@4 deploy --config=wrangler.json --name=luna --assets=website/dist-docs
          fi
