name: luna

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "luna/**"
      - "js/luna/**"
      - "js/loader/**"
      - "js/components/**"
      - "js/wcr/**"
      - "js/wcssr/**"
      - "js/stella/**"
      - "js/testing/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/luna.yaml"
  pull_request:
    paths:
      - "luna/**"
      - "js/luna/**"
      - "js/loader/**"
      - "js/components/**"
      - "js/wcr/**"
      - "js/wcssr/**"
      - "js/stella/**"
      - "js/testing/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/luna.yaml"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # luna-specific bench/bundle/treeshake/runtime/moonbench baselines.
  # Reports comment back on the PR via github-script; comment steps are
  # marked continue-on-error so a failing comment never blocks the run.
  luna-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Bundle size baseline
        id: bundle_size
        run: node luna/scripts/bundle-size.mjs --build --check --report /tmp/bundle-size-report.txt
        continue-on-error: true
      - name: Comment bundle size result
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const path = '/tmp/bundle-size-report.txt';
            const marker = '<!-- bundle-size -->';
            const body = fs.existsSync(path) ? fs.readFileSync(path, 'utf8').trim() : 'Bundle size check failed.';
            const hint = body.includes('ERROR') ? '\n\nUpdate baseline: `just bundle-baseline`' : '';
            const message = `${marker}\n**Bundle size diff**\n\n\`\`\`\n${body}\n\`\`\`${hint}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: message });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: message });
            }
      - name: Treeshake size baseline
        id: treeshake
        run: node luna/scripts/treeshake-size.mjs --build --check --report /tmp/treeshake-report.txt
        continue-on-error: true
      - name: Comment treeshake result
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const path = '/tmp/treeshake-report.txt';
            const marker = '<!-- treeshake-size -->';
            const body = fs.existsSync(path) ? fs.readFileSync(path, 'utf8').trim() : 'Treeshake check failed.';
            const hint = body.includes('❌') ? '\n\nUpdate baseline: `just treeshake-baseline`' : '';
            const message = `${marker}\n**Treeshake size diff**\n\n\`\`\`\n${body}\n\`\`\`${hint}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: message });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: message });
            }
      - name: Runtime benchmark baseline
        id: runtime_perf
        run: node luna/scripts/runtime-bench.mjs --build --check --report /tmp/runtime-bench-report.txt
        continue-on-error: true
      - name: Comment runtime benchmark result
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const path = '/tmp/runtime-bench-report.txt';
            const marker = '<!-- runtime-bench -->';
            const body = fs.existsSync(path) ? fs.readFileSync(path, 'utf8').trim() : 'Runtime benchmark check failed.';
            const hint = body.includes('ERROR') ? '\n\nUpdate baseline: `just runtime-baseline`' : '';
            const message = `${marker}\n**Runtime benchmark diff**\n\n\`\`\`\n${body}\n\`\`\`${hint}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: message });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: message });
            }
      - name: Moon bench baseline
        id: moonbench
        run: node luna/scripts/moonbench-check.mjs --check --report /tmp/moonbench-report.txt
        continue-on-error: true
      - name: Comment moon bench result
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const path = '/tmp/moonbench-report.txt';
            const marker = '<!-- moonbench -->';
            const body = fs.existsSync(path) ? fs.readFileSync(path, 'utf8').trim() : 'Moon bench check failed.';
            const hint = body.includes('ERROR') ? '\n\nUpdate baseline: `just moonbench-baseline`' : '';
            const message = `${marker}\n**Moon bench diff**\n\n\`\`\`\n${body}\n\`\`\`${hint}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: message });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: message });
            }
      - name: Fail if treeshake check failed
        if: steps.treeshake.outcome == 'failure'
        run: exit 1
      - name: Fail if bundle size check failed
        if: steps.bundle_size.outcome == 'failure'
        run: exit 1
      - name: Warn if runtime benchmark check failed
        if: steps.runtime_perf.outcome == 'failure'
        run: echo "::warning::Runtime benchmark regression detected (non-blocking)"
      - name: Warn if moon bench check failed
        if: steps.moonbench.outcome == 'failure'
        run: echo "::warning::Moon bench regression detected (non-blocking)"

  # Cross-platform tests (non-JS targets: wasm, wasm-gc, native) — luna only.
  test-xplat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Test core/routes (wasm, wasm-gc, native)
        run: |
          moon test --target wasm luna/src/core/routes
          moon test --target wasm-gc luna/src/core/routes
          moon test --target native luna/src/core/routes
      - name: Test core/render (wasm, wasm-gc, native)
        run: |
          moon test --target wasm luna/src/core/render
          moon test --target wasm-gc luna/src/core/render
          moon test --target native luna/src/core/render
      - name: Test luna_components/aria (wasm, wasm-gc, native)
        run: |
          moon test --target wasm luna_components/src/aria
          moon test --target wasm-gc luna_components/src/aria
          moon test --target native luna_components/src/aria

  # Vitest browser tests
  vitest-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Build MoonBit
        run: |
          # Core libraries
          moon build --target js --release luna/src
          moon build --target js --release luna/src/js/api
          moon build --target js --release luna/src/js/api_signals
          moon build --target js --release luna/src/js/stream_renderer
          moon build --target js --release luna/src/x/stella
          # Test packages for browser tests
          moon build --target js --release luna/src/tests/counter_component
          moon build --target js --release luna/src/tests/counter_client
          moon build --target js --release luna/src/tests/browser_components
          moon build --target js --release luna/src/tests/router_csr
          # Examples for browser tests
          moon build --target js --release luna/src/examples/spa
          moon build --target js --release luna/src/examples/todomvc
          moon build --target js --release luna/src/examples/browser_router
          moon build --target js --release luna/src/examples/wc
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Vitest browser tests
        run: pnpm test:browser

  # E2E tests with Playwright (luna)
  luna-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Build MoonBit
        run: |
          # Core libraries
          moon build --target js --release luna/src
          moon build --target js --release luna/src/js/api
          moon build --target js --release luna/src/js/api_signals
          moon build --target js --release luna/src/js/stream_renderer
          moon build --target js --release luna/src/x/stella
          # Test packages for e2e tests
          moon build --target js --release luna/src/tests/counter_component
          moon build --target js --release luna/src/tests/counter_client
          moon build --target js --release luna/src/tests/browser_components
          moon build --target js --release luna/src/tests/router_csr
          # Examples for e2e tests
          moon build --target js --release luna/src/examples/spa
          moon build --target js --release luna/src/examples/todomvc
          moon build --target js --release luna/src/examples/browser_router
          moon build --target js --release luna/src/examples/wc
          moon build --target js --release luna_components/src/examples/apg-playground
      - name: Build Loader
        run: pnpm --filter @luna_ui/luna-loader build
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: E2E tests
        run: pnpm playwright test --config luna/e2e/playwright.config.mts
