name: astra

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "astra/**"
      - "js/astra/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/astra.yaml"
  pull_request:
    paths:
      - "astra/**"
      - "js/astra/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/astra.yaml"

permissions:
  contents: read

jobs:
  # astra middleware Playwright + node:test build_dev_parity smoke
  astra-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Build astra CLI bundle
        run: moon build --target js --release
      - name: Install Playwright Chromium
        # Install via astra's own pnpm context so the headless-shell
        # cache path matches astra's @playwright/test version.
        run: cd astra && pnpm exec playwright install chromium --with-deps
      - name: astra Playwright (dev_smoke)
        run: cd astra && pnpm test:e2e
      # astra/examples/<name>/ Playwright VRT.
      #
      # The baselines under each example's `e2e/__screenshots__/linux/`
      # are seeded from `mcr.microsoft.com/playwright:v1.59.1-noble`
      # (see `just test-vrt-astra <name> --update --linux`). The host's
      # `ubuntu-latest` runner ships a different font set, so we run the
      # actual test pass inside that same docker image to keep font
      # rendering deterministic — host builds the dist/, container only
      # runs `playwright test`.
      - name: Build astra example dist/ on host (moon-toolchain side)
        run: |
          pnpm -F @luna_ui/sol-landing-example build
          pnpm -F @luna_ui/sol-changelog-example build
          pnpm -F @luna_ui/sol-components-demo-example build
          pnpm -F @luna_ui/sol-portfolio-example build
          pnpm -F @luna_ui/sol-api-ref-example build
          pnpm -F @luna_ui/sol-docs-search-example build
      - name: sol_landing Playwright VRT (docker)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work/astra/examples/sol_landing \
            -e CI=true \
            -e HOME=/tmp \
            --network host \
            --user "$(id -u):$(id -g)" \
            mcr.microsoft.com/playwright:v1.59.1-noble \
            npx --no-install playwright test --config e2e/playwright.config.mts
      - name: sol_changelog Playwright VRT (docker)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work/astra/examples/sol_changelog \
            -e CI=true \
            -e HOME=/tmp \
            --network host \
            --user "$(id -u):$(id -g)" \
            mcr.microsoft.com/playwright:v1.59.1-noble \
            npx --no-install playwright test --config e2e/playwright.config.mts
      - name: sol_components_demo Playwright VRT (docker)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work/astra/examples/sol_components_demo \
            -e CI=true \
            -e HOME=/tmp \
            --network host \
            --user "$(id -u):$(id -g)" \
            mcr.microsoft.com/playwright:v1.59.1-noble \
            npx --no-install playwright test --config e2e/playwright.config.mts
      - name: sol_portfolio Playwright VRT (docker)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work/astra/examples/sol_portfolio \
            -e CI=true \
            -e HOME=/tmp \
            --network host \
            --user "$(id -u):$(id -g)" \
            mcr.microsoft.com/playwright:v1.59.1-noble \
            npx --no-install playwright test --config e2e/playwright.config.mts
      - name: sol_api_ref Playwright VRT (docker)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work/astra/examples/sol_api_ref \
            -e CI=true \
            -e HOME=/tmp \
            --network host \
            --user "$(id -u):$(id -g)" \
            mcr.microsoft.com/playwright:v1.59.1-noble \
            npx --no-install playwright test --config e2e/playwright.config.mts
      - name: sol_docs_search Playwright VRT (docker)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work/astra/examples/sol_docs_search \
            -e CI=true \
            -e HOME=/tmp \
            --network host \
            --user "$(id -u):$(id -g)" \
            mcr.microsoft.com/playwright:v1.59.1-noble \
            npx --no-install playwright test --config e2e/playwright.config.mts
      - name: Upload astra example VRT diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: astra-example-vrt-diffs
          path: |
            astra/examples/sol_landing/test-results/**
            astra/examples/sol_landing/playwright-report/**
            astra/examples/sol_changelog/test-results/**
            astra/examples/sol_changelog/playwright-report/**
            astra/examples/sol_components_demo/test-results/**
            astra/examples/sol_components_demo/playwright-report/**
            astra/examples/sol_portfolio/test-results/**
            astra/examples/sol_portfolio/playwright-report/**
            astra/examples/sol_api_ref/test-results/**
            astra/examples/sol_api_ref/playwright-report/**
            astra/examples/sol_docs_search/test-results/**
            astra/examples/sol_docs_search/playwright-report/**
          if-no-files-found: ignore
