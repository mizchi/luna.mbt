name: astra

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "astra/**"
      - "js/astra/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/astra.yaml"
  pull_request:
    paths:
      - "astra/**"
      - "js/astra/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/astra.yaml"

permissions:
  contents: read

jobs:
  # astra middleware Playwright + node:test build_dev_parity smoke
  astra-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
      - name: Build astra CLI bundle
        run: moon build --target js --release
      - name: Install Playwright Chromium
        # Install via astra's own pnpm context so the headless-shell
        # cache path matches astra's @playwright/test version.
        run: cd astra && pnpm exec playwright install chromium --with-deps
      - name: astra Playwright (dev_smoke)
        run: cd astra && pnpm test:e2e
