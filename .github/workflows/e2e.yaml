name: e2e

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  # E2E tests with Playwright
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Clone markdown.mbt
        run: git clone --depth 1 https://github.com/mizchi/markdown.mbt ../markdown.mbt
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - uses: hustcer/setup-moonbit@v1
        with:
          version: latest
      - run: |
          moon update
          moon install
      - name: Sync markdown.mbt sources
        run: |
          cp ../markdown.mbt/moon.mod.json .mooncakes/mizchi/markdown/
          cp -r ../markdown.mbt/src/* .mooncakes/mizchi/markdown/src/
      - name: Build MoonBit
        run: moon build --target js
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: E2E tests (core)
        run: pnpm test:e2e
      - name: E2E tests (sol_app)
        working-directory: examples/sol_app
        run: |
          pnpm install
          pnpm test:e2e
